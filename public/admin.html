<!DOCTYPE html>
<html lang="sv" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - High Hand</title>
    <link rel="icon" href="/images/misc/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="description" content="Adminpanel för Poker High Hand Display">
</head>
<body class="h-full flex items-center justify-center p-4 bg-gray-900">

    <div class="w-full max-w-lg bg-gray-800 p-6 sm:p-8 rounded-xl shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl sm:text-2xl font-bold text-gray-100">Uppdatera High Hand</h1>
            <div class="flex items-center gap-4">
                <!-- Återställ-knapp -->
                <button id="reset-btn" type="button" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">
                    Återställ
                </button>
                <div id="connection-status" class="w-4 h-4 rounded-full bg-red-500" title="Frånkopplad"></div>
                <button id="settings-toggle-btn" type="button" class="text-gray-400 hover:bg-gray-700 rounded-lg text-sm p-2" title="Visa/Dölj inställningar">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.096 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>
        </div>
        
        <form id="high-hand-form">
            <div id="main-form-fields" class="space-y-6">
                <div>
                    <label for="player-name" class="block text-sm font-medium text-gray-300 mb-1">Spelarens namn</label>
                    <div class="relative">
                        <input type="text" id="player-name" name="player-name" required class="w-full px-4 py-2 border border-gray-600 rounded-md focus:ring-indigo-500 focus:border-indigo-500 bg-gray-700 text-gray-200" placeholder="Namn" autocomplete="off">
                        <div id="player-suggestions" class="absolute z-10 w-full bg-gray-800 border border-gray-600 rounded-md mt-1 hidden max-h-60 overflow-y-auto shadow-lg">
                            <!-- Autocomplete suggestions will be injected here -->
                        </div>
                    </div>
                </div>
                <div>
                    <label for="participant-count" class="block text-sm font-medium text-gray-300 mb-1">Antal deltagare</label>
                    <div class="grid grid-cols-3 gap-2 mt-1">
                        <button type="button" id="decrement-btn" class="w-full py-2 bg-gray-600 text-lg font-bold hover:bg-gray-500 rounded-md">-</button>
                        <input type="number" id="participant-count" name="participant-count" min="0" class="w-full text-center px-2 py-2 border border-gray-600 rounded-md focus:ring-indigo-500 focus:border-indigo-500 bg-gray-700 text-gray-200" placeholder="0">
                        <button type="button" id="increment-btn" class="w-full py-2 bg-gray-600 text-lg font-bold hover:bg-gray-500 rounded-md">+</button>
                    </div>
                </div>
                <div>
                     <label class="block text-sm font-medium text-gray-300 mb-2">Kort</label>
                     <div id="cards-input" class="grid grid-cols-5 gap-2"></div>
                </div>
                <!-- Hand Rank Display -->
                <div class="text-center pt-4">
                    <p id="hand-rank-display" class="text-xl font-semibold text-gray-100 h-4"></p>
                </div>
            </div>
            <button type="submit" id="submit-btn" class="w-full mt-8 bg-indigo-600 text-white font-bold py-3 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:bg-gray-600" disabled>
                Ansluter till servern...
            </button>
        </form>
        <p id="status-message" class="mt-4 text-center text-sm font-medium h-5"></p>

        <!-- Settings Section -->
        <div id="settings-section" class="mt-8 border-t border-gray-700 pt-6 hidden">
            <!-- Large Screen Settings -->
            <h2 class="text-xl font-bold text-gray-100 mb-4">Displayinställningar - Stor Skärm (index.html)</h2>
            <div id="settings-form-large" class="space-y-4 mb-8">
                <!-- Large settings will be populated here by JS -->
            </div>

            <!-- Small Screen Settings -->
            <h2 class="text-xl font-bold text-gray-100 mb-4">Displayinställningar - Liten Skärm (index-small.html)</h2>
            <div id="settings-form-small" class="space-y-4">
                <!-- Small settings will be populated here by JS -->
            </div>

            <div class="mt-8">
                <label for="background-select" class="block text-sm font-medium text-gray-300 mb-1">Bakgrundsbild (Gemensam)</label>
                <select id="background-select" class="w-full px-4 py-2 border border-gray-600 rounded-md focus:ring-indigo-500 focus:border-indigo-500 bg-gray-700 text-gray-200">
                    <option value=""></option>
                </select>
                <p id="background-error" class="text-xs text-red-500 mt-1 h-4"></p>
            </div>
        </div>
    </div>

    <script type="module">
        // --- Applikationslogik ---
        const highHandForm = document.getElementById('high-hand-form');
        const statusMessage = document.getElementById('status-message');
        const submitBtn = document.getElementById('submit-btn');
        const connectionStatusEl = document.getElementById('connection-status');
        const backgroundSelect = document.getElementById('background-select');
        const backgroundError = document.getElementById('background-error');
        const playerNameInput = document.getElementById('player-name');
        const playerSuggestionsContainer = document.getElementById('player-suggestions');
        const settingsFormLarge = document.getElementById('settings-form-large');
        const settingsFormSmall = document.getElementById('settings-form-small');
        const settingsSection = document.getElementById('settings-section');
        const settingsToggleBtn = document.getElementById('settings-toggle-btn');
        const mainFormFields = document.getElementById('main-form-fields');
        const resetBtn = document.getElementById('reset-btn');
        const handRankDisplay = document.getElementById('hand-rank-display');
        let socket;
        let playerNames = [];

        // --- Helper function to set suit color on the select element ---
        function setSuitSelectColor(selectElement) {
            const selectedSuit = suits.find(s => s.symbol === selectElement.value);
            // First, remove any existing color classes
            selectElement.classList.remove('text-black', 'text-red-500', 'text-gray-200');
            // Then, add the correct one
            if (selectedSuit && selectedSuit.color) {
                selectElement.classList.add(selectedSuit.color);
            } else {
                selectElement.classList.add('text-gray-200'); // Default color for N/A
            }
        }

        // --- Hand Evaluation Logic (copied from index.html) ---
        function evaluateHand(cards) {
            if (!cards || cards.length < 5 || cards.some(card => card.rank === "N/A" || card.suit === "N/A")) {
                return ""; // Return empty string if hand is incomplete
            }
            const rankOrder = { 'A': 14, 'K': 13, 'Q': 12, 'J': 11, '10': 10, '9': 9, '8': 8, '7': 7, '6': 6, '5': 5, '4': 4, '3': 3, '2': 2 };
            const ranks = cards.map(c => c.rank);
            const suits = cards.map(c => c.suit);
            const values = ranks.map(r => rankOrder[r]).sort((a, b) => b - a);

            const rankCounts = {};
            ranks.forEach(r => rankCounts[r] = (rankCounts[r] || 0) + 1);
            const suitCounts = {};
            suits.forEach(s => suitCounts[s] = (suitCounts[s] || 0) + 1);

            const isFlush = Object.values(suitCounts).some(count => count === 5);
            const isStraight = (() => {
                const unique = [...new Set(values)];
                if (unique.length !== 5) return false;
                if (unique[0] - unique[4] === 4) return true;
                if (unique[0] === 14 && unique[1] === 5 && unique[2] === 4 && unique[3] === 3 && unique[4] === 2) return true;
                return false;
            })();

            const counts = Object.values(rankCounts).sort((a, b) => b - a);

            if (isFlush && isStraight && values[0] === 14) return "ROYAL FLUSH";
            if (isFlush && isStraight) return "FÄRGSTEGE";
            if (counts[0] === 4) return "FYRTAL";
            if (counts[0] === 3 && counts[1] === 2) return "KÅK";
            if (isFlush) return "FÄRG";
            if (isStraight) return "STEGE";
            if (counts[0] === 3) return "TRISS";
            if (counts[0] === 2 && counts[1] === 2) return "TVÅ PAR";
            if (counts[0] === 2) return "ETT PAR";
            return "HÖGT KORT";
        }

        function updateHandRankDisplay() {
            const cards = [];
            for (let i = 1; i <= 5; i++) {
                const rank = document.getElementById(`card-rank-${i}`).value;
                const suit = document.getElementById(`card-suit-${i}`).value;
                cards.push({ rank, suit });
            }
            handRankDisplay.textContent = evaluateHand(cards);
        }


        // --- Participant Count Buttons ---
        const participantCountInput = document.getElementById('participant-count');
        document.getElementById('decrement-btn').addEventListener('click', () => {
            let currentValue = parseInt(participantCountInput.value, 10) || 0;
            if (currentValue > 0) {
                participantCountInput.value = currentValue - 1;
            }
        });
        document.getElementById('increment-btn').addEventListener('click', () => {
            let currentValue = parseInt(participantCountInput.value, 10) || 0;
            participantCountInput.value = currentValue + 1;
        });

        // --- Settings Toggle ---
        settingsToggleBtn.addEventListener('click', () => {
            settingsSection.classList.toggle('hidden');
            mainFormFields.classList.toggle('hidden');
            submitBtn.classList.toggle('hidden');
            resetBtn.classList.toggle('hidden');
        });

        // --- Background Image Change ---
        backgroundSelect.addEventListener('change', () => {
            // When background changes, send a full update immediately
            const playerName = document.getElementById('player-name').value;
            const participantCount = document.getElementById('participant-count').value;
            const cards = [];
            for (let i = 1; i <= 5; i++) { cards.push({ rank: document.getElementById(`card-rank-${i}`).value, suit: document.getElementById(`card-suit-${i}`).value }); }
            const backgroundImage = backgroundSelect.value;
            const dataToSave = { playerName, participantCount: parseInt(participantCount, 10) || 0, cards, backgroundImage, updatedAt: new Date().toISOString() };

            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify(dataToSave));
            }
        });

        const cardsInputContainer = document.getElementById('cards-input');
        const ranks = ['N/A', 'A', 'K', 'Q', 'J', '10', '9', '8', '7', '6', '5', '4', '3', '2'];
        const suits = [{ symbol: 'N/A', name: 'N/A', color: '' }, { symbol: '♠', name: 'Spades', color: 'text-black' }, { symbol: '♥', name: 'Hearts', color: 'text-red-500' }, { symbol: '♦', name: 'Diamonds', color: 'text-red-500' }, { symbol: '♣', name: 'Clubs', color: 'text-black' }];
        for (let i = 1; i <= 5; i++) {
            const cardWrapper = document.createElement('div');
            cardWrapper.className = 'flex flex-col gap-1';
            const rankSelect = document.createElement('select');
            rankSelect.id = `card-rank-${i}`;
            rankSelect.className = 'w-full text-center px-1 py-2 border border-gray-600 rounded-md bg-gray-700 text-gray-200 text-lg';
            ranks.forEach(rank => { const option = document.createElement('option'); option.value = rank; option.textContent = rank; rankSelect.appendChild(option); });
            const suitSelect = document.createElement('select');
            suitSelect.id = `card-suit-${i}`;
            suitSelect.className = 'w-full text-center px-1 py-2 border border-gray-600 rounded-md bg-gray-700 text-gray-200 text-lg';
            suits.forEach(suit => { 
                const option = document.createElement('option'); 
                option.value = suit.symbol; 
                option.textContent = suit.symbol; 
                if (suit.color) {
                    option.className = suit.color;
                }
                suitSelect.appendChild(option); 
            });
            // Add event listener to update color on change
            suitSelect.addEventListener('change', () => {
                setSuitSelectColor(suitSelect);
                updateHandRankDisplay(); // Update rank display
            });

            rankSelect.addEventListener('change', updateHandRankDisplay); // Update rank display

            cardWrapper.appendChild(rankSelect);
            cardWrapper.appendChild(suitSelect);
            cardsInputContainer.appendChild(cardWrapper);
        }

        // Efter att kort-selects skapats:
        for (let i = 1; i <= 5; i++) {
            const rankSelect = document.getElementById(`card-rank-${i}`);
            const suitSelect = document.getElementById(`card-suit-${i}`);

            // När rank ändras från "N/A" till något annat
            rankSelect.addEventListener('change', function () {
                if (this.value !== 'N/A') {
                    // Hämta alla redan använda suits för denna valör (exkludera nuvarande kort)
                    const usedSuits = [];
                    for (let j = 1; j <= 5; j++) {
                        if (j === i) continue;
                        const otherRank = document.getElementById(`card-rank-${j}`).value;
                        const otherSuit = document.getElementById(`card-suit-${j}`).value;
                        if (otherRank === this.value && otherSuit !== 'N/A') {
                            usedSuits.push(otherSuit);
                        }
                    }
                    // Lista möjliga suits (exkludera N/A och redan använda)
                    const possibleSuits = suits
                        .map(s => s.symbol)
                        .filter(s => s !== 'N/A' && !usedSuits.includes(s));
                    // Om nuvarande suit är N/A eller redan upptagen, välj en ledig suit slumpmässigt
                    if (
                        suitSelect.value === 'N/A' ||
                        usedSuits.includes(suitSelect.value)
                    ) {
                        if (possibleSuits.length > 0) {
                            // Välj slumpmässig ledig suit
                            const randomSuit = possibleSuits[Math.floor(Math.random() * possibleSuits.length)];
                            suitSelect.value = randomSuit;
                        } else {
                            // Om alla suits är upptagna, sätt till N/A
                            suitSelect.value = 'N/A';
                        }
                        setSuitSelectColor(suitSelect); // Update color
                    }
                } else {
                    // Om rank sätts till N/A, sätt även suit till N/A
                    suitSelect.value = 'N/A';
                    setSuitSelectColor(suitSelect); // Update color
                }

                // Kontrollera att det inte finns dubbletter av rank+suit, annars rätta till
                fixDuplicateRanks();
            });

            // När suit ändras manuellt, kontrollera att det inte blir dubblett
            suitSelect.addEventListener('change', function () {
                fixDuplicateRanks();
                updateHandRankDisplay(); // Update rank display
            });
        }

        function fixDuplicateRanks() {
            // Samla alla rank+suit-kombinationer
            const combos = {};
            for (let i = 1; i <= 5; i++) {
                const rank = document.getElementById(`card-rank-${i}`).value;
                const suit = document.getElementById(`card-suit-${i}`).value;
                if (rank === 'N/A' || suit === 'N/A') continue;
                const key = `${rank}_${suit}`;
                if (combos[key]) {
                    // Dubblett hittad, byt suit på detta kort till en ledig
                    const usedSuits = [];
                    for (let j = 1; j <= 5; j++) {
                        if (j === i) continue;
                        const otherRank = document.getElementById(`card-rank-${j}`).value;
                        const otherSuit = document.getElementById(`card-suit-${j}`).value;
                        if (otherRank === rank && otherSuit !== 'N/A') {
                            usedSuits.push(otherSuit);
                        }
                    }
                    const possibleSuits = suits
                        .map(s => s.symbol)
                        .filter(s => s !== 'N/A' && !usedSuits.includes(s));
                    if (possibleSuits.length > 0) {
                        document.getElementById(`card-suit-${i}`).value = possibleSuits[0];
                    } else {
                        document.getElementById(`card-suit-${i}`).value = 'N/A';
                    }
                    setSuitSelectColor(document.getElementById(`card-suit-${i}`)); // Update color
                    updateHandRankDisplay(); // Update rank display
                } else {
                    combos[key] = true;
                }
            }
        }

        function updateForm(data) {
            if (!data) return;
            document.getElementById('player-name').value = data.playerName || '';
            document.getElementById('participant-count').value = data.participantCount || 0;
            if (data.cards && data.cards.length === 5) {
                for (let i = 0; i < 5; i++) {
                    document.getElementById(`card-rank-${i + 1}`).value = data.cards[i].rank;
                    const suitSelect = document.getElementById(`card-suit-${i + 1}`);
                    suitSelect.value = data.cards[i].suit;
                    setSuitSelectColor(suitSelect); // Set initial color
                }
            }
            backgroundSelect.value = data.backgroundImage || '';
            updateHandRankDisplay(); // Set initial hand rank
        }

        async function fetchAndRenderSettings() {
            try {
                const response = await fetch('/api/settings');
                if (!response.ok) throw new Error('Kunde inte hämta inställningar');
                const settings = await response.json(); // { large: {...}, small: {...} }
                
                renderSettingsForType('large', settings.large, settingsFormLarge);
                renderSettingsForType('small', settings.small, settingsFormSmall);

            } catch (error) {
                console.error('Fel vid hämtning av inställningar:', error);
            }
        }

        function renderSettingsForType(type, settingsData, formElement) {
            const settingControls = [
                { id: 'titleFontSize', label: 'Titel', min: 2, max: 12, step: 0.5, unit: 'rem' },
                { id: 'participantCountFontSize', label: 'Antal', min: 1, max: 8, step: 0.5, unit: 'rem' },
                { id: 'cardSize', label: 'Kortstorlek', min: 10, max: 30, step: 1, unit: 'vw' },
                { id: 'handNameFontSize', label: 'Handnamn', min: 2, max: 10, step: 0.5, unit: 'rem' },
                { id: 'playerNameFontSize', label: 'Spelarnamn', min: 2, max: 12, step: 0.5, unit: 'rem' }
            ];

            formElement.innerHTML = ''; // Rensa gamla kontroller
            settingControls.forEach(({ id, label, min, max, step, unit }) => {
                const value = settingsData[id] || 0;
                const controlHtml = `
                    <div class="grid grid-cols-3 items-center gap-4">
                        <label for="setting-${type}-${id}" class="text-sm font-medium text-gray-300 col-span-1">${label}</label>
                        <input type="range" id="setting-${type}-${id}" data-setting-id="${id}" data-setting-type="${type}" min="${min}" max="${max}" step="${step}" value="${value}" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer col-span-1">
                        <span class="text-sm text-gray-400 col-span-1"><span id="value-${type}-${id}">${value}</span> ${unit}</span>
                    </div>
                `;
                formElement.insertAdjacentHTML('beforeend', controlHtml);
            });

            // Add event listeners after creating the controls
            formElement.querySelectorAll('input[type="range"]').forEach(input => {
                input.addEventListener('input', (e) => {
                    const id = e.target.dataset.settingId;
                    const type = e.target.dataset.settingType;
                    document.getElementById(`value-${type}-${id}`).textContent = e.target.value;
                });
                input.addEventListener('change', handleSettingChange);
            });
        }

        async function handleSettingChange(event) {
            const id = event.target.dataset.settingId;
            const type = event.target.dataset.settingType;
            const value = parseFloat(event.target.value);
            
            try {
                await fetch(`/api/settings/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [id]: value })
                });
            } catch (error) {
                console.error(`Kunde inte spara inställning ${id} for ${type}:`, error);
            }
        }

        async function fetchPlayers() {
            try {
                const response = await fetch('/api/players');
                if (!response.ok) throw new Error('Kunde inte hämta spelare');
                playerNames = await response.json();
                // We don't populate a datalist anymore
            } catch (error) {
                console.error('Fel vid hämtning av spelare:', error);
            }
        }

        // --- Custom Autocomplete Logic ---
        playerNameInput.addEventListener('input', () => {
            const inputText = playerNameInput.value.toLowerCase();
            if (inputText.length === 0) {
                playerSuggestionsContainer.classList.add('hidden');
                return;
            }

            const suggestions = playerNames.filter(name => name.toLowerCase().startsWith(inputText));
            
            playerSuggestionsContainer.innerHTML = '';
            if (suggestions.length > 0) {
                suggestions.forEach(suggestion => {
                    const suggestionEl = document.createElement('div');
                    suggestionEl.textContent = suggestion;
                    suggestionEl.className = 'px-4 py-2 cursor-pointer text-gray-100 hover:bg-gray-700 border-b border-gray-700 last:border-b-0';
                    suggestionEl.addEventListener('click', () => {
                        playerNameInput.value = suggestion;
                        playerSuggestionsContainer.classList.add('hidden');
                    });
                    playerSuggestionsContainer.appendChild(suggestionEl);
                });
                playerSuggestionsContainer.classList.remove('hidden');
            } else {
                playerSuggestionsContainer.classList.add('hidden');
            }
        });

        // Hide suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!playerNameInput.contains(e.target) && !playerSuggestionsContainer.contains(e.target)) {
                playerSuggestionsContainer.classList.add('hidden');
            }
        });


        async function addNewPlayerIfNeeded(name) {
            const trimmedName = name.trim();
            if (trimmedName && !playerNames.some(p => p.toLowerCase() === trimmedName.toLowerCase())) {
                try {
                    const response = await fetch('/api/players', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: trimmedName })
                    });
                    if (response.ok) {
                        console.log(`Spelare '${trimmedName}' tillagd.`);
                        await fetchPlayers(); // Uppdatera datalistan med den nya spelaren
                    }
                } catch (error) {
                    console.error(`Kunde inte lägga till spelare '${trimmedName}':`, error);
                }
            }
        }

        async function fetchBackgrounds() {
            try {
                const response = await fetch('/api/backgrounds');
                if (!response.ok) { throw new Error(`Nätverksfel: HTTP-status: ${response.status}`); }
                const backgrounds = await response.json();
                backgrounds.forEach(bg => {
                    const option = document.createElement('option');
                    option.value = `/images/backgrounds/${bg}`;
                    option.textContent = bg;
                    backgroundSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Fel vid hämtning av bakgrundsbilder:", error);
                backgroundError.textContent = 'Kunde inte ladda bakgrundsbilder.';
            }
        }

        function connect(backgroundsPromise) {
            const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            socket = new WebSocket(`${protocol}://${window.location.host}`);
            socket.onopen = () => {
                connectionStatusEl.classList.replace('bg-red-500', 'bg-green-500');
                connectionStatusEl.title = 'Ansluten';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Spara ny högsta hand';
                // Admin does not need to register a type
            };
            socket.onmessage = async (event) => {
                await backgroundsPromise;
                await fetchPlayers(); // Hämta spelare när anslutningen är upprättad
                await fetchAndRenderSettings(); // Hämta inställningar
                const data = JSON.parse(event.data);

                // Admin only cares about the initial high-hand data to populate the form
                // It gets settings via a separate API call.
                if (data.type === 'initialState' || data.type === 'handUpdate') {
                    const payload = data.payload.highHand || data.payload;
                    updateForm(payload);
                }
            };
            socket.onclose = () => {
                connectionStatusEl.classList.replace('bg-green-500', 'bg-red-500');
                connectionStatusEl.title = 'Frånkopplad';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Ansluter till servern...';
                setTimeout(() => connect(backgroundsPromise), 3000);
            };
            socket.onerror = (error) => { console.error('WebSocket-fel:', error); socket.close(); };
        }

        highHandForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sparar...';
            statusMessage.textContent = '';
            try {
                const playerName = document.getElementById('player-name').value;
                await addNewPlayerIfNeeded(playerName); // Lägg till ny spelare om det behövs

                const participantCount = document.getElementById('participant-count').value;
                const cards = [];
                for (let i = 1; i <= 5; i++) { cards.push({ rank: document.getElementById(`card-rank-${i}`).value, suit: document.getElementById(`card-suit-${i}`).value }); }
                const backgroundImage = backgroundSelect.value;
                const dataToSave = { playerName, participantCount: parseInt(participantCount, 10) || 0, cards, backgroundImage, updatedAt: new Date().toISOString() };
                
                if (socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify(dataToSave)); // This now sends a generic message
                    statusMessage.textContent = 'Högsta handen har uppdaterats!';
                    statusMessage.className = 'mt-4 text-center text-sm font-medium h-5 text-green-400';
                } else { throw new Error('Ingen anslutning till servern.'); }
            } catch (error) {
                statusMessage.textContent = 'Ett fel uppstod.';
                statusMessage.className = 'mt-4 text-center text-sm font-medium h-5 text-red-400';
            } finally {
                 setTimeout(() => {
                    if (socket.readyState === WebSocket.OPEN) { submitBtn.disabled = false; submitBtn.textContent = 'Spara ny högsta hand'; }
                    statusMessage.textContent = '';
                }, 2000);
            }
        });
        
        document.getElementById('reset-btn').addEventListener('click', () => {
            // Skicka "reset"-data till displayen
            const backgroundImage = backgroundSelect.value;
            const dataToSave = {
                playerName: "",
                participantCount: 0,
                cards: [
                    { rank: "N/A", suit: "N/A" },
                    { rank: "N/A", suit: "N/A" },
                    { rank: "N/A", suit: "N/A" },
                    { rank: "N/A", suit: "N/A" },
                    { rank: "N/A", suit: "N/A" }
                ],
                backgroundImage, // Behåll nuvarande bakgrund
                updatedAt: new Date().toISOString(),
                reset: true,
                handName: ""
            };
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify(dataToSave));
                statusMessage.textContent = 'Återställd!';
                statusMessage.className = 'mt-4 text-center text-sm font-medium h-5 text-green-400';
            }
            // Uppdatera formuläret visuellt för att matcha reset-läget
            document.getElementById('player-name').value = "";
            document.getElementById('participant-count').value = 0;
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`card-rank-${i}`).value = 'N/A';
                const suitSelect = document.getElementById(`card-suit-${i}`);
                suitSelect.value = 'N/A';
                setSuitSelectColor(suitSelect); // Reset color
            }
            updateHandRankDisplay(); // Clear hand rank display
        });

        const backgroundsPromise = fetchBackgrounds();
        connect(backgroundsPromise);
    </script>
</body>
</html>
